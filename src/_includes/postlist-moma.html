<ul class="postlist">
    {% for post in collections.moma reversed %}
    <li class="content-card">

        <a class="project-title" href="{{ post.url }}">
            <img class="card-image" src="{{post.data.img}}">
            {{ post.data.linkTitle }}
            <br>
        </a>
        <p class="caption">{{ post.data.description }}</p>

    </li>
    {% endfor %}
</ul>
